name: brain_clean_mobile
description: "A neuro-scientific digital detox mobile app — Brain Clean."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.5.0
  go_router: ^14.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.0.0
  intl: ">=0.19.0 <0.21.0"
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  audioplayers: ^6.1.0
  confetti: ^0.7.0
  share_plus: ^10.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/rain.mp3
    - assets/sounds/waves.mp3
    - assets/sounds/forest.mp3
    - assets/sounds/white_noise.mp3
    - assets/sounds/brown_noise.mp3
